<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esteban Campaña - Portafolio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="second-section">
    <div id="mkt-digital-title">
        <h2 style="color:aliceblue;">¿Tu empresa necesita <br>Marketing Digital?</h2>
        <h6 style="color:aliceblue;">
            Tu información será usada para generar un mensaje personalizado para whatsapp.
        </h6>
    </div>

    <form>
        <h3 style="color:aliceblue;">Nombre/Empresa:</h3>
        <input type="text" placeholder="Escribe tu nombre o empresa">

        <h4 style="color:aliceblue;">Correo:</h4>
        <input type="text" placeholder="Escribe tu email">

        <div id="checkbox-group">
            <h3 style="color:aliceblue;">¿Qué servicios necesita tu empresa?</h3>

            <label class="checkbox-item">
                <input type="checkbox">
                <span class="checkbox-text">Optimización de Página Web</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox">
                <span class="checkbox-text">SEO Web/Posicionamiento Web</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox">
                <span class="checkbox-text">Community Management</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox">
                <span class="checkbox-text">Diseño Publicitario y Gráfico</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox">
                <span class="checkbox-text">Diseño de logo</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox">
                <span class="checkbox-text">Fotografía profesional</span>
            </label>
        </div>

        <button type="submit">Enviar</button>
    </form>

    <div id="mkt">
        <img src="img/mkt.webp">
    </div>
</div>

</body>
</html>
